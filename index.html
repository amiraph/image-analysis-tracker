<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Analysis — Project Logger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f0f2f8; --card: #fff; --border: #e0e4f0; --text: #111827; --muted: #6b7280;
  --accent: #4f46e5; --green: #16a34a; --green-light: #dcfce7; --red: #dc2626;
  --red-light: #fee2e2; --amber: #d97706; --amber-light: #fef3c7; --blue: #2563eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* ── Loading / error ── */
#loading-state { text-align: center; padding: 80px 32px; color: var(--muted); font-size: 16px; }
#loading-state .spinner { width: 36px; height: 36px; border: 3px solid #e0e4f0; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Header ── */
header {
  background: var(--accent); padding: 0 32px;
  display: flex; align-items: center; gap: 16px; height: 56px;
  position: sticky; top: 0; z-index: 200;
}
header h1 { font-size: 17px; font-weight: 700; color: #fff; }
header .date { color: rgba(255,255,255,.65); font-size: 12px; margin-left: 8px; }
.add-btn { margin-left: auto; background: rgba(255,255,255,.2); color: #fff; border: 1.5px solid rgba(255,255,255,.4); border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.add-btn:hover { background: rgba(255,255,255,.3); }

/* ── Summary bar ── */
.summary-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; }
.sitem { padding: 14px 28px 14px 0; border-right: 1px solid var(--border); margin-right: 28px; display: flex; flex-direction: column; gap: 2px; }
.sitem .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
.sitem .val { font-size: 22px; font-weight: 800; }
.sitem .sub { font-size: 11px; color: var(--muted); }
.sitem.warn .val { color: var(--red); }

/* ── Main ── */
main { padding: 20px 32px; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
.sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-top: 8px; margin-bottom: 2px; display: flex; align-items: center; gap: 10px; }
.sec::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── Project card ── */
.project-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: box-shadow .15s; }
.project-card:hover { box-shadow: 0 4px 16px rgba(79,70,229,.08); }
.project-card.over-budget { border-color: #fca5a5; }
.card-main { display: grid; grid-template-columns: 260px 1fr 200px; }
.card-identity { padding: 16px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; background: #fafbff; }
.pname { font-size: 14px; font-weight: 700; }
.pteam { font-size: 12px; }
.ppi   { font-size: 11.5px; color: var(--muted); }
.meta-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.card-visual { padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
.card-stats { padding: 14px 20px; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; justify-content: center; }
.stat { display: flex; justify-content: space-between; align-items: center; }
.stat .s-lbl { font-size: 11px; color: var(--muted); }
.stat .s-val { font-size: 13px; font-weight: 700; }
.stat .s-val.red { color: var(--red); } .stat .s-val.green { color: var(--green); } .stat .s-val.amber { color: var(--amber); }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.b-done    { background: #dcfce7; color: #166534; }
.b-inprog  { background: #fef3c7; color: #92400e; }
.b-todo    { background: #e2e8f0; color: #475569; }
.b-over    { background: #fee2e2; color: #991b1b; }
.b-track   { background: #dbeafe; color: #1e40af; }
.b-behind  { background: #fff7ed; color: #9a3412; }
.b-waiting { background: #f5f3ff; color: #6d28d9; }
.b-po      { background: #f0fdf4; color: #166534; font-size: 10px; }
.b-na      { background: #f8fafc; color: #64748b; font-size: 10px; border: 1px solid #e2e8f0; }

/* ── Hours budget bar ── */
.hours-bar-labels { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.hl { font-weight: 700; font-size: 12px; } .hl.over { color: var(--red); } .hl.done-lbl { color: var(--green); }
.bar-track { position: relative; height: 28px; border-radius: 7px; background: var(--green-light); border: 1.5px solid #bbf7d0; overflow: hidden; display: flex; align-items: stretch; }
.bar-track.over { background: #fee2e2; border-color: #fca5a5; }
.bar-fill { border-radius: 5px 0 0 5px; background: linear-gradient(90deg, #15803d, #22c55e); display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; min-width: 0; flex-shrink: 0; transition: width .5s ease; }
.bar-fill.full-fill { border-radius: 0; }
.bar-fill-pct { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.9); white-space: nowrap; }
.bar-overflow-seg { flex-shrink: 0; background: linear-gradient(90deg, #ef4444, #b91c1c); display: flex; align-items: center; justify-content: center; padding: 0 6px; font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap; border-radius: 0 5px 5px 0; overflow: hidden; }
.bar-ticks { position: absolute; inset: 0; pointer-events: none; }
.bar-tick { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,.4); }
.bar-sub { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── Weekly bars ── */
.weekly-section { margin-top: 4px; }
.weekly-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
.weekly-bars { display: flex; gap: 5px; align-items: flex-end; overflow-x: auto; padding-bottom: 2px; position: relative; }
.week-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; cursor: default; }
.week-col.current-week .week-bar { outline: 2px solid var(--accent); outline-offset: 1px; border-radius: 4px 4px 0 0; }
.week-bar-track { display: flex; align-items: flex-end; height: 40px; }
.week-bar { width: 22px; border-radius: 4px 4px 0 0; min-height: 3px; transition: height .3s ease; }
.week-hrs { font-size: 9px; font-weight: 700; color: var(--text); line-height: 1; min-height: 10px; }
.week-lbl { font-size: 8.5px; color: var(--muted); text-align: center; white-space: nowrap; line-height: 1.3; }
.week-col.current-week .week-lbl { color: var(--accent); font-weight: 700; }
.target-line { position: absolute; left: 0; right: 0; border-top: 1.5px dashed #d1d5db; pointer-events: none; }

/* ── Lifespan timeline ── */
.lifespan-wrap { display: flex; flex-direction: column; gap: 4px; }
.lifespan-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
.lifespan-center { font-size: 10px; color: var(--muted); text-align: center; }
.lifespan-bar-outer { position: relative; height: 10px; margin-bottom: 16px; }
.lifespan-bar-track { position: absolute; inset: 0; border-radius: 5px; overflow: hidden; background: #e5e7eb; }
.lifespan-today-marker { position: absolute; top: -3px; width: 2px; height: 16px; background: var(--red); border-radius: 2px; z-index: 2; }
.lifespan-today-lbl { position: absolute; top: 16px; font-size: 9px; font-weight: 700; color: var(--red); transform: translateX(-50%); white-space: nowrap; }

/* ── Actions / Log panel ── */
.card-actions { border-top: 1px solid var(--border); background: #fafbff; padding: 8px 20px; display: flex; align-items: center; gap: 10px; }
.log-toggle-btn { background: none; border: 1.5px solid var(--border); border-radius: 7px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all .12s; }
.log-toggle-btn:hover, .log-toggle-btn.active { border-color: var(--accent); color: var(--accent); background: #eef0ff; }
.edit-btn { background: none; border: 1.5px solid var(--border); border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--muted); }
.edit-btn:hover { border-color: var(--muted); color: var(--text); }
.log-panel { display: none; border-top: 1px solid var(--border); padding: 16px 20px; background: #fff; }
.log-panel.open { display: block; }
.log-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
.log-table thead th { text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 4px 10px; border-bottom: 1px solid var(--border); }
.log-table tbody td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid #f3f4f6; }
.log-table tbody tr:last-child td { border-bottom: none; }
.log-table tbody tr.over-row td { background: #fff5f5; }
.log-table tbody tr.over-row td:nth-child(2) { color: var(--red); font-weight: 700; }
.cum-bar { height: 6px; border-radius: 3px; background: #e5e7eb; position: relative; display: inline-block; width: 80px; vertical-align: middle; }
.cum-fill { height: 100%; border-radius: 3px; position: absolute; left:0; top:0; }
.del-log { background: none; border: none; cursor: pointer; color: #d1d5db; font-size: 13px; padding: 2px 5px; border-radius: 4px; }
.del-log:hover { color: var(--red); background: #fee2e2; }
.add-log-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--border); }
.add-log-row label { font-size: 11px; font-weight: 600; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
.add-log-row input { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: inherit; background: #fff; }
.add-log-row input[type=number] { width: 80px; } .add-log-row input[type=date] { width: 140px; } .add-log-row input[type=text] { width: 200px; }
.add-log-row input:focus { outline: 2px solid var(--accent); border-color: transparent; }
.add-log-submit { background: var(--green); color: #fff; border: none; border-radius: 7px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; align-self: flex-end; }
.add-log-submit:hover { background: #15803d; }
.saving-indicator { font-size: 11px; color: var(--muted); margin-left: auto; display: none; }

/* ── Modal ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(17,24,39,.45); z-index: 300; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--card); border-radius: 14px; padding: 28px; width: 500px; max-width: 96vw; box-shadow: 0 20px 60px rgba(0,0,0,.18); }
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 14px; }
.field label { font-size: 11px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
.field input, .field select { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; background: #fafbfc; }
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); background: #fff; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
.modal-btns button { border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
.btn-cancel { background: #f1f5f9; color: var(--text); } .btn-cancel:hover { background: #e2e8f0; }
.btn-save   { background: var(--accent); color: #fff; }  .btn-save:hover { background: #4338ca; }
.btn-delete { background: #fee2e2; color: var(--red); }  .btn-delete:hover { background: #fecaca; }
</style>
</head>
<body>

<div id="loading-state">
  <div class="spinner"></div>
  Connecting to database…
</div>

<div id="app" style="display:none;">
  <header>
    <svg width="22" height="22" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="13" y2="18"/></svg>
    <h1>Image Analysis — Project Logger</h1>
    <span style="background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.05em;">v2</span>
    <span class="date" id="today-lbl"></span>
    <button class="add-btn" onclick="openAddModal()">+ Add Project</button>
  </header>
  <div class="summary-bar" id="summary-bar"></div>
  <main id="main-cards">
    <div class="sec">Projects</div>
  </main>
</div>

<!-- Modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add Project</h3>
    <div class="field"><label>Project Name</label><input type="text" id="m-name" placeholder="e.g. WGA Analysis Dev"/></div>
    <div class="two-col">
      <div class="field"><label>Researcher / PI</label><input type="text" id="m-pi"/></div>
      <div class="field"><label>Team Member</label><input type="text" id="m-team-member"/></div>
    </div>
    <div class="field"><label>Student</label><input type="text" id="m-team" placeholder="Student name"/></div>
    <div class="two-col">
      <div class="field"><label>Start Date</label><input type="date" id="m-start"/></div>
      <div class="field"><label>Deadline</label><input type="date" id="m-deadline"/></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Budget (hours total)</label><input type="number" id="m-budget" min="1" placeholder="40"/></div>
      <div class="field"><label>Status</label>
        <select id="m-status" onchange="toggleWaitingField()">
          <option>To Do</option><option>In Progress</option><option>Waiting</option><option>Done</option>
        </select>
      </div>
    </div>
    <div class="field" id="waiting-field" style="display:none;">
      <label>Waiting for</label>
      <input type="text" id="m-waiting-for" placeholder="e.g. new images from student"/>
    </div>
    <div class="field"><label>Payment State</label>
      <select id="m-payment"><option>Quote NA</option><option>Purchase Order Received</option><option>Invoiced</option><option>Paid</option></select>
    </div>
    <div class="modal-btns">
      <button class="btn-delete" id="modal-del" style="display:none;margin-right:auto;" onclick="deleteProject()">Delete Project</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://yyaqudqtykzyurzpamgr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_A0Plsj0wLNewDlKdw6n9QQ_TnhgPAPu';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
});

let projects = [];
let editingId = null;

// ── Init ──
async function init() {
  try {
    await loadData();
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('today-lbl').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
    render();
  } catch(e) {
    document.getElementById('loading-state').innerHTML = `<div style="color:#dc2626;">Error connecting to database: ${e.message}</div>`;
  }
}

async function loadData() {
  const [{ data: projs, error: pe }, { data: logs, error: le }, { data: waits, error: we }] = await Promise.all([
    db.from('projects').select('*').order('created_at'),
    db.from('hour_logs').select('*').order('log_date'),
    db.from('waiting_periods').select('*').order('start_date')
  ]);
  if (pe) throw pe;
  if (le) throw le;
  if (we) throw we;
  projects = projs.map(p => ({
    ...p,
    logs: logs.filter(l => l.project_id === p.id),
    waiting_periods: (waits || []).filter(w => w.project_id === p.id)
  }));
}

// ── Computed helpers ──
function loggedHrs(p) { return (p.logs||[]).reduce((s,l) => s + (l.hours||0), 0); }
function isOver(p)    { return loggedHrs(p) > p.budget_hrs; }

function totalWaitingDays(p) {
  const today = new Date(); today.setHours(0,0,0,0);
  return (p.waiting_periods || []).reduce((total, w) => {
    const ws = new Date(w.start_date);
    const we = w.end_date ? new Date(w.end_date) : today;
    return total + Math.max(0, (we - ws) / (1000*3600*24));
  }, 0);
}

function paceStatus(p) {
  if (p.status === 'Waiting') return 'waiting';
  if (p.status !== 'In Progress') return null;
  if (!p.start_date || !p.deadline) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const start    = new Date(p.start_date);
  const deadline = new Date(p.deadline);
  if (today < start) return null;
  const calendarElapsed  = (today - start) / (1000*3600*24);
  const waitDays         = totalWaitingDays(p);
  const effectiveElapsed = Math.max(0, calendarElapsed - waitDays);
  const totalDays        = Math.max(1, (deadline - start) / (1000*3600*24));
  const expectedHrs      = (effectiveElapsed / totalDays) * p.budget_hrs;
  return loggedHrs(p) >= expectedHrs * 0.9 ? 'on-track' : 'behind';
}

// ── Lifespan timeline bar ──
function lifespanBarHTML(p) {
  if (!p.start_date || !p.deadline) return '';
  const today    = new Date(); today.setHours(0,0,0,0);
  const start    = new Date(p.start_date);
  const deadline = new Date(p.deadline);

  // Extend bar if today is past deadline
  const barEnd   = today > deadline ? today : deadline;
  const totalMs  = Math.max(barEnd - start, 1);

  function toPct(d) { return Math.max(0, Math.min(100, (d - start) / totalMs * 100)); }

  // Build segments
  const waits = (p.waiting_periods || [])
    .map(w => ({ s: new Date(w.start_date), e: w.end_date ? new Date(w.end_date) : today }))
    .sort((a,b) => a.s - b.s);

  const segments = [];
  let cursor = start;

  waits.forEach(w => {
    if (w.s > cursor) segments.push({ type: 'active',  s: cursor, e: w.s });
    segments.push(     { type: 'waiting', s: w.s,    e: w.e });
    cursor = w.e;
  });

  // Active portion up to today (or deadline if past)
  const activeEnd = today < deadline ? today : deadline;
  if (cursor < activeEnd) segments.push({ type: 'active', s: cursor, e: activeEnd });

  // Future (today → deadline)
  if (today < deadline) segments.push({ type: 'future', s: today, e: deadline });

  // Overdue (deadline → today)
  if (today > deadline) segments.push({ type: 'overdue', s: deadline, e: today });

  const segColors = {
    active:  'background: linear-gradient(90deg,#4f46e5,#818cf8);',
    waiting: 'background: repeating-linear-gradient(45deg,#c4b5fd,#c4b5fd 4px,#ede9fe 4px,#ede9fe 8px);',
    future:  'background: #e5e7eb;',
    overdue: 'background: linear-gradient(90deg,#ef4444,#b91c1c);'
  };

  const segDivs = segments.map(s => {
    const l = toPct(s.s), w = toPct(s.e) - l;
    if (w <= 0) return '';
    return `<div style="position:absolute;left:${l.toFixed(2)}%;width:${w.toFixed(2)}%;top:0;bottom:0;${segColors[s.type]}"></div>`;
  }).join('');

  // Today marker
  const todayPct = toPct(today);
  const todayMarker = `
    <div class="lifespan-today-marker" style="left:${todayPct.toFixed(2)}%;">
      <div class="lifespan-today-lbl">Today</div>
    </div>`;

  // Day counters
  const calDays     = Math.round((today - start) / (1000*3600*24));
  const totalDays   = Math.round((deadline - start) / (1000*3600*24));
  const waitDays    = Math.round(totalWaitingDays(p));
  const effectiveDays = Math.max(0, calDays - waitDays);
  const startStr    = start.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
  const deadlineStr = deadline.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});

  let centerLabel = '';
  if (calDays <= 0) {
    centerLabel = `Starts in ${Math.abs(calDays)}d`;
  } else if (today > deadline) {
    centerLabel = `⚠ ${Math.round((today - deadline)/(1000*3600*24))}d past deadline`;
  } else {
    centerLabel = `Day ${effectiveDays} of ${totalDays}d${waitDays > 0 ? ` · ⏳ ${waitDays}d waiting` : ''}`;
  }

  // Legend
  const hasWaiting = waitDays > 0;
  const legend = `<div style="display:flex;gap:12px;font-size:9px;color:var(--muted);margin-top:2px;align-items:center;">
    <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:10px;height:6px;border-radius:2px;background:linear-gradient(90deg,#4f46e5,#818cf8);"></span>Active</span>
    ${hasWaiting ? `<span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:10px;height:6px;border-radius:2px;background:repeating-linear-gradient(45deg,#c4b5fd,#c4b5fd 3px,#ede9fe 3px,#ede9fe 6px);"></span>Waiting</span>` : ''}
    <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:10px;height:6px;border-radius:2px;background:#e5e7eb;"></span>Remaining</span>
  </div>`;

  return `<div class="lifespan-wrap">
    <div class="lifespan-labels">
      <span>📅 ${startStr}</span>
      <span class="lifespan-center">${centerLabel}</span>
      <span>🏁 ${deadlineStr}</span>
    </div>
    <div class="lifespan-bar-outer">
      <div class="lifespan-bar-track">${segDivs}</div>
      ${todayMarker}
    </div>
    ${legend}
  </div>`;
}

// ── Weekly bars ──
function weeklyBarsHTML(p) {
  const logs = p.logs || [];
  if (!p.start_date) return '';

  function weekStart(d) {
    const date = new Date(d); date.setHours(0,0,0,0);
    const day = date.getDay();
    date.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
    return date;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const thisWeekMs = weekStart(today).getTime();
  const startWeek  = weekStart(new Date(p.start_date));

  const weeks = [];
  const cur = new Date(startWeek);
  while (cur <= today) { weeks.push(new Date(cur)); cur.setDate(cur.getDate() + 7); }
  if (weeks.length === 0) return '';

  const weekMap = {};
  logs.forEach(l => {
    const ws = weekStart(new Date(l.log_date)).getTime();
    weekMap[ws] = (weekMap[ws] || 0) + (l.hours || 0);
  });

  // Implied weekly target from deadline
  let impliedHpw = null;
  if (p.deadline && p.start_date && p.budget_hrs) {
    const totalWeeks = Math.max(1, (new Date(p.deadline) - new Date(p.start_date)) / (7*24*3600*1000));
    impliedHpw = p.budget_hrs / totalWeeks;
  }

  const maxHrs = Math.max(...weeks.map(w => weekMap[w.getTime()] || 0), impliedHpw || 1);
  const BAR_MAX = 40;
  const targetLineTop = impliedHpw ? BAR_MAX - Math.round((impliedHpw / maxHrs) * BAR_MAX) : null;

  const display = weeks.slice(-20);
  const cols = display.map(w => {
    const wt   = w.getTime();
    const hrs  = weekMap[wt] || 0;
    const barH = hrs > 0 ? Math.max(3, Math.round((hrs / maxHrs) * BAR_MAX)) : 0;
    const isCurrent = wt === thisWeekMs;
    const barColor = hrs === 0 ? '#e5e7eb'
      : impliedHpw && hrs >= impliedHpw ? '#16a34a'
      : impliedHpw && hrs >= impliedHpw * 0.7 ? '#86efac'
      : '#fde68a';
    const dateStr = w.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    const [day, mon] = dateStr.split(' ');
    return `<div class="week-col${isCurrent?' current-week':''}" title="${dateStr}: ${hrs ? hrs+'h logged' : 'no hours logged'}${isCurrent?' (this week)':''}">
      <div class="week-hrs">${hrs > 0 ? hrs+'h' : ''}</div>
      <div class="week-bar-track">
        <div class="week-bar" style="height:${barH}px;background:${barColor};"></div>
      </div>
      <div class="week-lbl">${mon}<br>${day}</div>
    </div>`;
  }).join('');

  const targetLabel = impliedHpw ? `— - - avg target: ${impliedHpw.toFixed(1)}h/wk` : '';
  return `<div class="weekly-section">
    <div class="weekly-title">Hours per week <span style="font-weight:400;color:#9ca3af;">${targetLabel}</span></div>
    <div class="weekly-bars" style="position:relative;">
      ${targetLineTop !== null ? `<div class="target-line" style="top:${targetLineTop}px;"></div>` : ''}
      ${cols}
    </div>
  </div>`;
}

// ── Render ──
function render() { renderSummary(); renderCards(); }

function renderSummary() {
  const total    = projects.length;
  const done     = projects.filter(p => p.status === 'Done').length;
  const waiting  = projects.filter(p => p.status === 'Waiting').length;
  const over     = projects.filter(p => isOver(p)).length;
  const totBudget = projects.reduce((s,p) => s + p.budget_hrs, 0);
  const totLogged = projects.reduce((s,p) => s + loggedHrs(p), 0);
  const behind   = projects.filter(p => paceStatus(p) === 'behind').length;

  document.getElementById('summary-bar').innerHTML = `
    <div class="sitem"><div class="lbl">Projects</div><div class="val">${total}</div><div class="sub">${done} done · ${total-done} active</div></div>
    <div class="sitem"><div class="lbl">Total Budget</div><div class="val">${totBudget}h</div></div>
    <div class="sitem"><div class="lbl">Hours Logged</div><div class="val">${totLogged.toFixed(1)}h</div><div class="sub">${Math.round(totLogged/totBudget*100)}% of budget</div></div>
    ${waiting ? `<div class="sitem"><div class="lbl">⏳ Waiting</div><div class="val" style="color:#6d28d9;">${waiting}</div><div class="sub">paused</div></div>` : ''}
    ${behind  ? `<div class="sitem warn"><div class="lbl">⚠ Behind Pace</div><div class="val">${behind}</div></div>` : ''}
    ${over    ? `<div class="sitem warn"><div class="lbl">⚠ Over Budget</div><div class="val">${over}</div></div>` : ''}
  `;
}

function renderCards() {
  const main = document.getElementById('main-cards');
  main.querySelectorAll('.project-card').forEach(el => el.remove());

  projects.forEach(p => {
    const lg   = loggedHrs(p);
    const over = isOver(p);
    const pct  = Math.min(lg / p.budget_hrs, 1) * 100;
    const pace = paceStatus(p);
    const today = new Date(); today.setHours(0,0,0,0);

    let greenBarPct, redBarPct;
    if (over) {
      greenBarPct = (p.budget_hrs / lg) * 100;
      redBarPct   = ((lg - p.budget_hrs) / lg) * 100;
    } else {
      greenBarPct = pct;
      redBarPct   = 0;
    }

    const remaining = Math.max(0, p.budget_hrs - lg).toFixed(1);
    const ticks = [25,50,75].map(t => `<div class="bar-tick" style="left:${t}%;"></div>`).join('');

    // Days to deadline
    let daysLeftStr = '—', daysLeftClass = '';
    if (p.deadline) {
      const dl = new Date(p.deadline);
      const daysLeft = Math.ceil((dl - today) / (1000*3600*24));
      daysLeftStr  = daysLeft < 0 ? `${Math.abs(daysLeft)}d overdue` : `${daysLeft}d left`;
      daysLeftClass = daysLeft < 0 ? 'red' : daysLeft < 14 ? 'amber' : '';
    }

    let statusBadge = over ? `<span class="badge b-over">Over Budget</span>`
      : p.status==='Done'        ? `<span class="badge b-done">Done</span>`
      : p.status==='In Progress' ? `<span class="badge b-inprog">In Progress</span>`
      : p.status==='Waiting'     ? `<span class="badge b-waiting">Waiting</span>`
      : `<span class="badge b-todo">To Do</span>`;

    let paceBadge = pace==='on-track' ? `<span class="badge b-track">On Track</span>`
      : pace==='behind'  ? `<span class="badge b-behind">Behind</span>`
      : pace==='waiting' ? `<span class="badge b-waiting">⏳ Waiting</span>`
      : '';

    let payBadge = p.payment==='Purchase Order Received'
      ? `<span class="badge b-po">PO Received</span>`
      : `<span class="badge b-na">${p.payment}</span>`;

    const logRows = [...(p.logs||[])].sort((a,b) => b.log_date.localeCompare(a.log_date)).map(l => {
      const cum    = (p.logs||[]).filter(x => x.log_date <= l.log_date).reduce((s,x) => s+(x.hours||0), 0);
      const cumPct = Math.min(cum / p.budget_hrs, 1) * 100;
      const isOvr  = cum > p.budget_hrs;
      return `<tr class="${isOvr?'over-row':''}">
        <td>${l.log_date}</td><td>${l.hours}h</td><td>${l.note||'—'}</td>
        <td><span class="cum-bar"><span class="cum-fill" style="width:${cumPct}%;background:${isOvr?'#dc2626':'#22c55e'};"></span></span>
          <span style="font-size:10px;color:var(--muted);margin-left:5px;">${cum.toFixed(1)}h</span></td>
        <td><button class="del-log" onclick="deleteLog('${p.id}','${l.id}')">✕</button></td>
      </tr>`;
    }).join('');

    const card = document.createElement('div');
    card.className = `project-card${over?' over-budget':''}`;
    card.id = `card-${p.id}`;
    card.innerHTML = `
      <div class="card-main">
        <div class="card-identity">
          <div class="pname">${p.name}</div>
          <div class="pteam">${p.team||''}</div>
          <div class="ppi">${p.pi||''}</div>
          ${p.team_member ? `<div class="ppi">${p.team_member}</div>` : ''}
          <div class="meta-row" style="margin-top:8px;">${statusBadge}${paceBadge}</div>
          <div class="meta-row">${payBadge}</div>
          ${p.waiting_for ? `<div style="margin-top:6px;font-size:11px;color:#6d28d9;background:#f5f3ff;border-radius:5px;padding:4px 8px;">⏳ ${p.waiting_for}</div>` : ''}
        </div>
        <div class="card-visual">
          <div>
            <div class="hours-bar-labels">
              <span class="hl${over?' over':lg===p.budget_hrs?' done-lbl':''}">${lg.toFixed(1)}h logged</span>
              <span>${p.budget_hrs}h budget</span>
            </div>
            <div class="bar-track${over?' over':''}">
              <div class="bar-fill${over||pct>=100?' full-fill':''}" style="width:${greenBarPct}%;">
                ${greenBarPct>12?`<span class="bar-fill-pct">${over?Math.round(p.budget_hrs/lg*100):Math.round(pct)}%</span>`:''}
              </div>
              ${over?`<div class="bar-overflow-seg" style="width:${redBarPct}%;">+${(lg-p.budget_hrs).toFixed(1)}h</div>`:''}
              <div class="bar-ticks">${ticks}</div>
            </div>
            <div class="bar-sub">
              <span>0h</span>
              <span style="color:${over?'var(--red)':'var(--muted)'};">${over?lg.toFixed(1)+'h total':remaining+'h remaining'}</span>
              <span>${p.budget_hrs}h</span>
            </div>
          </div>
          ${weeklyBarsHTML(p)}
          ${lifespanBarHTML(p)}
        </div>
        <div class="card-stats">
          <div class="stat"><span class="s-lbl">Logged</span><span class="s-val ${over?'red':''}">${lg.toFixed(1)} / ${p.budget_hrs}h</span></div>
          <div class="stat"><span class="s-lbl">Remaining</span><span class="s-val ${over?'red':''}">${over?'−'+(lg-p.budget_hrs).toFixed(1)+'h':remaining+'h'}</span></div>
          <div class="stat"><span class="s-lbl">Deadline</span><span class="s-val ${daysLeftClass}">${daysLeftStr}</span></div>
          <div class="stat"><span class="s-lbl">Waiting days</span><span class="s-val" style="color:#6d28d9;">${Math.round(totalWaitingDays(p))||'—'}</span></div>
          <div class="stat"><span class="s-lbl">Log entries</span><span class="s-val">${(p.logs||[]).length}</span></div>
        </div>
      </div>
      <div class="card-actions">
        <button class="log-toggle-btn" id="log-btn-${p.id}" onclick="toggleLog('${p.id}')">＋ Log Hours <span style="font-size:11px;color:var(--muted);">(${(p.logs||[]).length} entries)</span></button>
        <button class="edit-btn" onclick="openEditModal('${p.id}')">✎ Edit</button>
        <span class="saving-indicator" id="saving-${p.id}">Saving…</span>
      </div>
      <div class="log-panel" id="log-panel-${p.id}">
        <table class="log-table">
          <thead><tr><th>Date</th><th>Hours</th><th>Note</th><th>Cumulative Progress</th><th></th></tr></thead>
          <tbody>${logRows||`<tr><td colspan="5" style="color:var(--muted);font-size:12px;font-style:italic;padding:8px 10px;">No hours logged yet.</td></tr>`}</tbody>
        </table>
        <div class="add-log-row">
          <label>Date<input type="date" id="li-date-${p.id}" value="${new Date().toISOString().split('T')[0]}"/></label>
          <label>Hours<input type="number" id="li-hrs-${p.id}" min="0.5" step="0.5" placeholder="4"/></label>
          <label>Note (optional)<input type="text" id="li-note-${p.id}" placeholder="What was done this week?"/></label>
          <button class="add-log-submit" onclick="addLog('${p.id}')">Log Hours</button>
        </div>
      </div>
    `;
    main.appendChild(card);
  });
}

// ── UI helpers ──
function toggleLog(id) {
  document.getElementById(`log-panel-${id}`).classList.toggle('open');
  document.getElementById(`log-btn-${id}`).classList.toggle('active');
}
function showSaving(id) {
  const el = document.getElementById(`saving-${id}`);
  if (el) { el.style.display = 'inline'; setTimeout(() => { el.style.display = 'none'; }, 1500); }
}

// ── Add hour log ──
async function addLog(id) {
  const date = document.getElementById(`li-date-${id}`).value;
  const hrs  = parseFloat(document.getElementById(`li-hrs-${id}`).value);
  const note = document.getElementById(`li-note-${id}`).value.trim();
  if (!date || !hrs || hrs <= 0) { alert('Enter a valid date and hours.'); return; }
  showSaving(id);
  const { error } = await db.from('hour_logs').insert({ project_id: id, log_date: date, hours: hrs, note });
  if (error) { alert('Error saving: ' + error.message); return; }
  const p = projects.find(x => x.id === id);
  if (p && p.status === 'To Do') {
    await db.from('projects').update({ status: 'In Progress' }).eq('id', id);
  }
  await loadData(); render();
  requestAnimationFrame(() => {
    document.getElementById(`log-panel-${id}`)?.classList.add('open');
    document.getElementById(`log-btn-${id}`)?.classList.add('active');
  });
}

// ── Delete log ──
async function deleteLog(pid, lid) {
  const { error } = await db.from('hour_logs').delete().eq('id', lid);
  if (error) { alert('Error: ' + error.message); return; }
  await loadData(); render();
  requestAnimationFrame(() => {
    document.getElementById(`log-panel-${pid}`)?.classList.add('open');
    document.getElementById(`log-btn-${pid}`)?.classList.add('active');
  });
}

function toggleWaitingField() {
  const isWaiting = document.getElementById('m-status').value === 'Waiting';
  document.getElementById('waiting-field').style.display = isWaiting ? 'block' : 'none';
}

// ── Modal ──
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Project';
  ['m-name','m-team','m-pi','m-team-member','m-waiting-for','m-deadline'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('waiting-field').style.display = 'none';
  document.getElementById('m-start').value   = new Date().toISOString().split('T')[0];
  document.getElementById('m-budget').value  = 40;
  document.getElementById('m-status').value  = 'To Do';
  document.getElementById('m-payment').value = 'Quote NA';
  document.getElementById('modal-del').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const p = projects.find(x => x.id === id);
  document.getElementById('modal-title').textContent      = 'Edit Project';
  document.getElementById('m-name').value                 = p.name;
  document.getElementById('m-pi').value                   = p.pi || '';
  document.getElementById('m-team-member').value          = p.team_member || '';
  document.getElementById('m-team').value                 = p.team || '';
  document.getElementById('m-waiting-for').value          = p.waiting_for || '';
  document.getElementById('m-start').value                = p.start_date || '';
  document.getElementById('m-deadline').value             = p.deadline || '';
  document.getElementById('m-budget').value               = p.budget_hrs;
  document.getElementById('m-status').value               = p.status;
  document.getElementById('m-payment').value              = p.payment;
  document.getElementById('waiting-field').style.display  = p.status === 'Waiting' ? 'block' : 'none';
  document.getElementById('modal-del').style.display      = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

async function saveModal() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Project name required.'); return; }
  const newStatus = document.getElementById('m-status').value;
  const today = new Date().toISOString().split('T')[0];

  const obj = {
    name,
    pi:          document.getElementById('m-pi').value.trim(),
    team_member: document.getElementById('m-team-member').value.trim(),
    team:        document.getElementById('m-team').value.trim(),
    waiting_for: document.getElementById('m-waiting-for').value.trim(),
    start_date:  document.getElementById('m-start').value || null,
    deadline:    document.getElementById('m-deadline').value || null,
    budget_hrs:  parseFloat(document.getElementById('m-budget').value) || 40,
    status:      newStatus,
    payment:     document.getElementById('m-payment').value
  };

  if (editingId) {
    const oldProject = projects.find(x => x.id === editingId);
    const oldStatus  = oldProject?.status;
    await db.from('projects').update(obj).eq('id', editingId);

    // Waiting period transitions
    if (newStatus === 'Waiting' && oldStatus !== 'Waiting') {
      // Open a new waiting period
      await db.from('waiting_periods').insert({ project_id: editingId, start_date: today });
    } else if (newStatus !== 'Waiting' && oldStatus === 'Waiting') {
      // Close the open waiting period
      await db.from('waiting_periods')
        .update({ end_date: today })
        .eq('project_id', editingId)
        .is('end_date', null);
    }
  } else {
    const { data, error } = await db.from('projects').insert(obj).select();
    if (error) { alert('Error saving: ' + error.message); return; }
    // If new project created as Waiting, open a waiting period
    if (newStatus === 'Waiting' && data?.[0]) {
      await db.from('waiting_periods').insert({ project_id: data[0].id, start_date: today });
    }
  }

  await loadData(); closeModal(); render();
}

async function deleteProject() {
  if (!confirm('Delete this project and all its logged hours?')) return;
  await db.from('projects').delete().eq('id', editingId);
  await loadData(); closeModal(); render();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

init();
</script>
</body>
</html>
